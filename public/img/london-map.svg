<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <!-- Water pattern -->
    <pattern id="water-ripple" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q10 5 20 10 Q30 15 40 10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
    </pattern>

    <!-- Street pattern for major roads -->
    <pattern id="road-hash" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="rgba(0,0,0,0.03)"/>
      <line x1="0" y1="8" x2="8" y2="0" stroke="rgba(0,0,0,0.02)" stroke-width="0.5"/>
    </pattern>

    <!-- Park trees texture -->
    <pattern id="park-dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="rgba(40,100,50,0.15)"/>
      <circle cx="9" cy="9" r="1" fill="rgba(30,80,40,0.1)"/>
    </pattern>

    <!-- Gradient for Thames -->
    <linearGradient id="thames-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6496"/>
      <stop offset="30%" stop-color="#3578b2"/>
      <stop offset="50%" stop-color="#3080bb"/>
      <stop offset="70%" stop-color="#2d72a8"/>
      <stop offset="100%" stop-color="#2a6496"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============================================ -->
  <!-- BASE: Warm parchment / beige map background  -->
  <!-- ============================================ -->
  <rect width="1000" height="700" fill="#e8dcc8"/>

  <!-- Subtle vignette overlay -->
  <rect width="1000" height="700" fill="url(#road-hash)" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- DISTRICT ZONES - colored regions             -->
  <!-- Thames flows at y≈418-448, matching station  -->
  <!-- gap between rows 9 (y~415) and 10 (y~460)   -->
  <!-- ============================================ -->

  <!-- North West - Paddington / Bayswater area (warm peach) -->
  <path d="M0 0 L250 0 L230 120 L180 200 L100 280 L0 300 Z" fill="#f0d8b8" opacity="0.5"/>

  <!-- North Central - Marylebone / Regent's Park (soft green-beige) -->
  <path d="M250 0 L520 0 L530 100 L480 200 L350 200 L230 120 Z" fill="#d8e4c8" opacity="0.45"/>

  <!-- North East - King's Cross / Islington (muted lavender) -->
  <path d="M520 0 L780 0 L820 100 L780 200 L600 200 L530 100 Z" fill="#d8d0e4" opacity="0.4"/>

  <!-- Far North East - Angel / Old Street (warm grey-blue) -->
  <path d="M780 0 L1000 0 L1000 250 L900 300 L820 200 L820 100 Z" fill="#ccd4e0" opacity="0.4"/>

  <!-- West - Notting Hill / Kensington (soft salmon) -->
  <path d="M0 300 L100 280 L160 350 L120 420 L0 420 Z" fill="#f0ccc0" opacity="0.45"/>

  <!-- Central West - Hyde Park to Mayfair (warm cream) -->
  <path d="M100 280 L350 200 L400 320 L350 400 L160 350 Z" fill="#f0e8d0" opacity="0.4"/>

  <!-- Central - Soho / West End (golden yellow tint) -->
  <path d="M350 200 L480 200 L520 300 L480 400 L400 410 L400 320 Z" fill="#f0e0b0" opacity="0.45"/>

  <!-- Central East - City of London (warm terracotta tint) -->
  <path d="M480 200 L780 200 L800 300 L750 400 L600 410 L520 300 Z" fill="#e8d0b8" opacity="0.4"/>

  <!-- East - Whitechapel / Tower area (dusty rose) -->
  <path d="M780 200 L1000 250 L1000 420 L850 420 L750 400 L800 300 Z" fill="#e0c8c8" opacity="0.4"/>

  <!-- South West - Chelsea / Lambeth (sage green) -->
  <path d="M0 460 L200 460 L300 480 L280 570 L150 600 L0 600 Z" fill="#c8d8c0" opacity="0.45"/>

  <!-- South Central - Westminster / Southwark (sky blue tint) -->
  <path d="M200 460 L450 455 L500 530 L400 600 L280 570 L300 480 Z" fill="#c8d8e8" opacity="0.4"/>

  <!-- South Central East - Waterloo / Borough (warm peach) -->
  <path d="M450 455 L650 450 L700 530 L600 610 L400 600 L500 530 Z" fill="#e0d4c4" opacity="0.4"/>

  <!-- South East - Bermondsey / Tower Bridge area (dusty blue) -->
  <path d="M650 450 L850 440 L1000 440 L1000 700 L700 700 L600 610 L700 530 Z" fill="#c8ccd8" opacity="0.4"/>

  <!-- Far South -->
  <path d="M0 600 L150 600 L280 570 L400 600 L600 610 L700 700 L0 700 Z" fill="#d0d8c8" opacity="0.35"/>

  <!-- ============================================ -->
  <!-- MAJOR ROADS (subtle street grid)             -->
  <!-- ============================================ -->
  <g stroke="#c0b098" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round">
    <!-- Euston Road (horizontal, top-middle) -->
    <path d="M50 110 Q200 105 400 110 Q600 115 850 108"/>
    <!-- Oxford Street (major east-west) -->
    <path d="M80 260 Q300 255 500 260 Q700 258 900 262"/>
    <!-- Regent Street (north-south curve) -->
    <path d="M420 30 Q410 100 400 200 Q390 300 385 380"/>
    <!-- Park Lane -->
    <path d="M180 150 Q170 220 165 300 Q158 360 150 400"/>
    <!-- Strand / Fleet Street -->
    <path d="M350 370 Q500 365 600 368 Q750 372 870 378"/>
    <!-- Victoria Embankment (along Thames, north bank) -->
    <path d="M300 408 Q450 405 600 410 Q750 415 850 418"/>
    <!-- Kingsway -->
    <path d="M450 200 Q455 300 460 380"/>
    <!-- Tottenham Court Road -->
    <path d="M380 100 Q385 180 390 280"/>
    <!-- Piccadilly -->
    <path d="M200 320 Q300 310 400 315 Q500 318 600 322"/>
    <!-- Whitehall -->
    <path d="M430 380 Q435 400 438 420"/>
  </g>

  <!-- Minor cross streets -->
  <g stroke="#c0b098" stroke-width="0.7" fill="none" opacity="0.25" stroke-linecap="round">
    <line x1="300" y1="50" x2="310" y2="200"/>
    <line x1="550" y1="50" x2="560" y2="180"/>
    <line x1="700" y1="50" x2="710" y2="200"/>
    <line x1="250" y1="200" x2="260" y2="350"/>
    <line x1="600" y1="200" x2="610" y2="360"/>
    <line x1="750" y1="200" x2="755" y2="370"/>
    <line x1="200" y1="350" x2="210" y2="420"/>
    <line x1="500" y1="300" x2="505" y2="410"/>
    <line x1="680" y1="300" x2="685" y2="410"/>
    <line x1="350" y1="460" x2="360" y2="540"/>
    <line x1="550" y1="455" x2="560" y2="540"/>
    <line x1="750" y1="450" x2="755" y2="540"/>
    <line x1="150" y1="100" x2="300" y2="110"/>
    <line x1="500" y1="100" x2="650" y2="108"/>
    <line x1="100" y1="200" x2="250" y2="205"/>
    <line x1="400" y1="360" x2="550" y2="365"/>
  </g>

  <!-- ============================================ -->
  <!-- PARKS (green areas with texture)             -->
  <!-- ============================================ -->

  <!-- Regent's Park (north, around stations 2,9,20 area) -->
  <ellipse cx="310" cy="70" rx="65" ry="35" fill="#8bb860" opacity="0.4"/>
  <ellipse cx="310" cy="70" rx="65" ry="35" fill="url(#park-dots)"/>
  <ellipse cx="310" cy="70" rx="50" ry="24" fill="#8bb860" opacity="0.2"/>

  <!-- Hyde Park (west side, around stations 73-76 area) -->
  <ellipse cx="100" cy="300" rx="50" ry="45" fill="#8bb860" opacity="0.38"/>
  <ellipse cx="100" cy="300" rx="50" ry="45" fill="url(#park-dots)"/>
  <ellipse cx="100" cy="300" rx="38" ry="32" fill="#8bb860" opacity="0.18"/>

  <!-- Green Park / St James's Park (near Westminster, between rows 8-9) -->
  <ellipse cx="370" cy="395" rx="45" ry="18" fill="#8bb860" opacity="0.35"/>
  <ellipse cx="370" cy="395" rx="45" ry="18" fill="url(#park-dots)"/>

  <!-- Victoria Park (east, near stations 55-56) -->
  <ellipse cx="910" cy="270" rx="30" ry="22" fill="#8bb860" opacity="0.3"/>
  <ellipse cx="910" cy="270" rx="30" ry="22" fill="url(#park-dots)"/>

  <!-- Battersea area green (south of river) -->
  <ellipse cx="250" cy="570" rx="40" ry="18" fill="#8bb860" opacity="0.25"/>

  <!-- ============================================ -->
  <!-- THAMES RIVER                                 -->
  <!-- Flows at y≈418-448, matching the gap between -->
  <!-- row 9 stations (y≈415) and row 10 (y≈460)   -->
  <!-- Gentle slope: higher on left, lower on right -->
  <!-- ============================================ -->

  <!-- River glow / wide stroke -->
  <path d="M-20 418 Q80 420 180 425 Q280 430 360 432
           Q440 434 500 436 Q560 438 620 440
           Q700 442 760 444 Q830 446 900 447
           Q950 448 1020 448"
        fill="none" stroke="#3080bb" stroke-width="42" opacity="0.15"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- River main body -->
  <path d="M-20 418 Q80 420 180 425 Q280 430 360 432
           Q440 434 500 436 Q560 438 620 440
           Q700 442 760 444 Q830 446 900 447
           Q950 448 1020 448"
        fill="none" stroke="url(#thames-grad)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- River highlight (center shine) -->
  <path d="M-20 418 Q80 420 180 425 Q280 430 360 432
           Q440 434 500 436 Q560 438 620 440
           Q700 442 760 444 Q830 446 900 447
           Q950 448 1020 448"
        fill="none" stroke="rgba(100,180,230,0.4)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Water texture overlay -->
  <path d="M-20 403 Q80 405 180 410 Q280 415 360 417
           Q440 419 500 421 Q560 423 620 425
           Q700 427 760 429 Q830 431 900 432
           Q950 433 1020 433
           L1020 463 Q950 463 900 462
           Q830 461 760 459 Q700 457 620 455
           Q560 453 500 451 Q440 449 360 447
           Q280 445 180 440 Q80 435 -20 433 Z"
        fill="url(#water-ripple)" opacity="0.6"/>

  <!-- South bank edge -->
  <path d="M-20 433 Q80 435 180 440 Q280 445 360 447
           Q440 449 500 451 Q560 453 620 455
           Q700 457 760 459 Q830 461 900 462
           Q950 463 1020 463"
        fill="none" stroke="#4a8ab0" stroke-width="1" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- BRIDGES (crossing the Thames)                -->
  <!-- Based on actual taxi connections that cross   -->
  <!-- the river gap between y≈415 and y≈460        -->
  <!-- ============================================ -->
  <g stroke="#a09070" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <!-- Near station 95->122 (x≈230) -->
    <line x1="220" y1="415" x2="225" y2="460"/>
    <!-- Near station 109->124 (x≈330) -->
    <line x1="325" y1="418" x2="330" y2="458"/>
    <!-- Near station 112->125 (x≈490) -->
    <line x1="488" y1="425" x2="492" y2="458"/>
    <!-- Near station 114->126 (x≈615) -->
    <line x1="612" y1="430" x2="618" y2="455"/>
    <!-- Near station 115->127 (x≈680) -->
    <line x1="678" y1="432" x2="685" y2="455"/>
    <!-- Near station 116->127 (x≈720) -->
    <line x1="718" y1="434" x2="725" y2="458"/>
    <!-- Near station 117->129 (x≈810) -->
    <line x1="808" y1="438" x2="815" y2="460"/>
  </g>

  <!-- Bridge details (little rectangles on bridges) -->
  <g fill="#b8a888" opacity="0.4">
    <rect x="218" y="432" width="6" height="3" rx="1"/>
    <rect x="323" y="435" width="6" height="3" rx="1"/>
    <rect x="486" y="438" width="6" height="3" rx="1"/>
    <rect x="610" y="440" width="6" height="3" rx="1"/>
    <rect x="676" y="441" width="6" height="3" rx="1"/>
    <rect x="716" y="443" width="6" height="3" rx="1"/>
    <rect x="806" y="446" width="6" height="3" rx="1"/>
  </g>

  <!-- ============================================ -->
  <!-- DISTRICT LABELS                              -->
  <!-- ============================================ -->
  <g font-family="Georgia, 'Playfair Display', serif" fill="#8a7a60" opacity="0.45" text-anchor="middle">
    <text x="100" y="42" font-size="11" font-weight="600" letter-spacing="3">PADDINGTON</text>
    <text x="420" y="42" font-size="10" font-weight="600" letter-spacing="3">KINGS CROSS</text>
    <text x="680" y="42" font-size="9" font-weight="600" letter-spacing="2.5">ISLINGTON</text>
    <text x="900" y="42" font-size="9" font-weight="600" letter-spacing="2.5">ANGEL</text>
    <text x="310" y="125" font-size="11" font-weight="600" letter-spacing="3">MARYLEBONE</text>
    <text x="630" y="125" font-size="10" font-weight="600" letter-spacing="2.5">BLOOMSBURY</text>
    <text x="100" y="248" font-size="9" font-weight="600" letter-spacing="2.5">NOTTING HILL</text>
    <text x="260" y="280" font-size="10" font-weight="600" letter-spacing="3">MAYFAIR</text>
    <text x="440" y="280" font-size="13" font-weight="700" letter-spacing="4">SOHO</text>
    <text x="560" y="340" font-size="9" font-weight="600" letter-spacing="2.5">COVENT GARDEN</text>
    <text x="720" y="340" font-size="11" font-weight="600" letter-spacing="3">THE CITY</text>
    <text x="900" y="340" font-size="9" font-weight="600" letter-spacing="2">WHITECHAPEL</text>
    <text x="200" y="398" font-size="9" font-weight="600" letter-spacing="2.5">KENSINGTON</text>
    <text x="460" y="410" font-size="10" font-weight="600" letter-spacing="3">WESTMINSTER</text>
    <text x="770" y="410" font-size="9" font-weight="600" letter-spacing="2.5">TOWER</text>
    <text x="300" y="510" font-size="10" font-weight="600" letter-spacing="3">LAMBETH</text>
    <text x="540" y="520" font-size="10" font-weight="600" letter-spacing="3">SOUTHWARK</text>
    <text x="780" y="510" font-size="9" font-weight="600" letter-spacing="2.5">BERMONDSEY</text>
    <text x="130" y="580" font-size="9" font-weight="600" letter-spacing="2">BRIXTON</text>
    <text x="870" y="500" font-size="9" font-weight="600" letter-spacing="2">ROTHERHITHE</text>
  </g>

  <!-- ============================================ -->
  <!-- LANDMARK MARKERS (small icons)               -->
  <!-- ============================================ -->
  <g opacity="0.3">
    <!-- Big Ben / Parliament area (near Westminster, north bank of new river) -->
    <g transform="translate(430,405)">
      <rect x="-2" y="-8" width="4" height="8" fill="#8a7a60" rx="1"/>
      <circle cx="0" cy="-10" r="3" fill="#8a7a60"/>
    </g>

    <!-- Tower of London area (near station 108/117) -->
    <g transform="translate(820,395)">
      <rect x="-5" y="-5" width="10" height="10" fill="none" stroke="#8a7a60" stroke-width="1"/>
      <rect x="-3" y="-8" width="2" height="3" fill="#8a7a60"/>
      <rect x="1" y="-8" width="2" height="3" fill="#8a7a60"/>
    </g>

    <!-- St Paul's Cathedral area (near station 84/85) -->
    <g transform="translate(620,320)">
      <path d="M-5 0 Q0 -10 5 0" fill="none" stroke="#8a7a60" stroke-width="1"/>
      <line x1="0" y1="-10" x2="0" y2="-13" stroke="#8a7a60" stroke-width="0.8"/>
    </g>

    <!-- Buckingham Palace area (near St James's Park) -->
    <g transform="translate(350,388)">
      <rect x="-6" y="-3" width="12" height="6" fill="none" stroke="#8a7a60" stroke-width="0.8" rx="1"/>
      <rect x="-1" y="-6" width="2" height="3" fill="#8a7a60"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- THAMES LABEL (on the river)                  -->
  <!-- ============================================ -->
  <text x="500" y="442" font-family="Georgia, serif" font-size="9" fill="#1a4a6e"
        opacity="0.35" text-anchor="middle" font-style="italic" letter-spacing="5">THAMES</text>

  <!-- ============================================ -->
  <!-- COMPASS ROSE (top-right)                     -->
  <!-- ============================================ -->
  <g transform="translate(950,45)" opacity="0.25">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#8a7a60" stroke-width="0.5"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#8a7a60" stroke-width="0.5"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#8a7a60" stroke-width="0.5"/>
    <polygon points="0,-15 -3,-5 0,-7 3,-5" fill="#8a7a60"/>
    <text x="0" y="-20" font-family="Georgia, serif" font-size="7" fill="#8a7a60" text-anchor="middle">N</text>
  </g>

  <!-- ============================================ -->
  <!-- DECORATIVE BORDER                            -->
  <!-- ============================================ -->
  <rect x="2" y="2" width="996" height="696" fill="none" stroke="#b8a888" stroke-width="2" rx="3" opacity="0.35"/>
  <rect x="6" y="6" width="988" height="688" fill="none" stroke="#b8a888" stroke-width="0.5" rx="2" opacity="0.2"/>

  <!-- Title cartouche (bottom-right corner) -->
  <g transform="translate(920,670)" opacity="0.2">
    <text font-family="Georgia, 'Playfair Display', serif" font-size="8" fill="#8a7a60" text-anchor="middle" font-style="italic">LONDON</text>
  </g>
</svg>
