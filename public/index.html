<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chennai Galatta</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-container">
      <h1>CHENNAI GALATTA</h1>
      <h2>The Great Chase</h2>
      <div class="join-form">
        <input type="text" id="player-name" placeholder="Your name" maxlength="20" autocomplete="off">
        <div class="role-select">
          <button class="role-btn" data-role="mrx" id="btn-join-mrx">Join as The Don</button>
          <button class="role-btn" data-role="detective" id="btn-join-detective">Join as Inspector</button>
        </div>
      </div>

      <div class="lobby-players" id="lobby-players">
        <h3>Players</h3>
        <div id="lobby-player-list"></div>
      </div>

      <div class="lobby-actions">
        <button id="btn-start" class="btn-primary" disabled>Start Game</button>
        <button id="btn-leave" class="btn-secondary" style="display:none">Leave</button>
      </div>

      <div class="lobby-info">
        <p>1 Don + up to 5 Inspectors. Empty slots filled by AI.</p>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-layout">
      <!-- Top bar -->
      <div class="top-bar">
        <div class="top-left">
          <span class="game-title">CHENNAI GALATTA</span>
          <span class="round-info" id="round-info">Round 1/22</span>
        </div>
        <div class="top-center">
          <span class="turn-info" id="turn-info">Waiting...</span>
        </div>
        <div class="top-right">
          <button id="btn-how-to-play" class="btn-small">How to Play</button>
          <button id="btn-pause" class="btn-small">Pause</button>
          <button id="btn-reset" class="btn-small btn-danger">Reset</button>
        </div>
      </div>

      <!-- Main area -->
      <div class="main-area">
        <!-- Board -->
        <div class="board-container" id="board-container">
          <canvas id="board-canvas"></canvas>
          <div class="map-legend">
            <div class="legend-item"><span class="legend-line taxi"></span> Auto</div>
            <div class="legend-item"><span class="legend-line bus"></span> Bus</div>
            <div class="legend-item"><span class="legend-line underground"></span> Metro</div>
            <div class="legend-item"><span class="legend-line ferry"></span> Boat</div>
          </div>
          <div class="board-zoom-controls">
            <button id="btn-zoom-in" title="Zoom In">+</button>
            <button id="btn-zoom-reset" title="Reset View">&#8634;</button>
            <button id="btn-zoom-out" title="Zoom Out">&minus;</button>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
          <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>

          <!-- Travel Log -->
          <div class="panel" id="travel-log-panel">
            <h3>The Don's Travel Log</h3>
            <div id="travel-log" class="travel-log"></div>
          </div>

          <!-- My Info -->
          <div class="panel" id="my-info-panel">
            <h3 id="my-role-title">My Info</h3>
            <div id="my-tickets" class="ticket-display"></div>
          </div>

          <!-- Players -->
          <div class="panel">
            <h3>Players</h3>
            <div id="player-list" class="player-list"></div>
          </div>
        </div>
      </div>

      <!-- Bottom action bar -->
      <div class="action-bar" id="action-bar">
        <div id="move-options" class="move-options"></div>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="game-over-overlay" class="overlay" style="display:none">
    <div class="overlay-content">
      <h2 id="game-over-title">Game Over</h2>
      <p id="game-over-reason"></p>
      <div class="game-over-stats" id="game-over-stats"></div>
      <div class="game-over-buttons">
        <button id="btn-review-game" class="btn-primary">Review Game</button>
        <button id="btn-new-game" class="btn-secondary">New Game</button>
      </div>
    </div>
  </div>

  <!-- History Review Overlay -->
  <div id="history-overlay" class="overlay" style="display:none">
    <div class="history-container">
      <div class="history-header">
        <h2>Game Review</h2>
        <button id="btn-history-close" class="btn-small" title="Close">&times;</button>
      </div>
      <div class="history-main">
        <div class="history-board-wrap">
          <canvas id="history-canvas"></canvas>
        </div>
        <div class="history-sidebar">
          <div class="history-nav">
            <button id="btn-hist-first" class="hist-nav-btn" title="First">&laquo;</button>
            <button id="btn-hist-prev" class="hist-nav-btn" title="Previous">&lsaquo;</button>
            <span id="hist-step-label" class="hist-step-label">Step 0 / 0</span>
            <button id="btn-hist-next" class="hist-nav-btn" title="Next">&rsaquo;</button>
            <button id="btn-hist-last" class="hist-nav-btn" title="Last">&raquo;</button>
          </div>
          <div class="history-round-info" id="hist-round-info"></div>
          <div class="history-move-info" id="hist-move-info"></div>
          <div class="history-positions" id="hist-positions"></div>
          <div class="history-event" id="hist-event"></div>
          <div class="history-round-select">
            <label>Jump to round:</label>
            <select id="hist-round-select"></select>
          </div>
        </div>
      </div>
      <div class="history-footer">
        <button id="btn-hist-back" class="btn-secondary">Back to Results</button>
        <button id="btn-hist-new-game" class="btn-primary">New Game</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/client.js"></script>
</body>
</html>
